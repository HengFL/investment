<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Premium Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />   <!-- Primary Indigo -->
      <stop offset="100%" stop-color="#db2777" /> <!-- Secondary Pink -->
    </linearGradient>
    <!-- Soft Drop Shadow for premium look -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Rounded Base Rect with Premium Gradient -->
  <rect width="100" height="100" rx="28" fill="url(#bgGrad)" filter="url(#dropShadow)" />
  
  <!-- Modern Styled Letter 'I' inside -->
  <text x="50%" y="54%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="'Outfit', 'Inter', system-ui, sans-serif" 
        font-weight="900" 
        font-size="64" 
        fill="#ffffff">I</text>
        
  <!-- Subtle glass shine highlight -->
  <path d="M 12 28 C 12 18, 18 12, 28 12 L 72 12 C 82 12, 88 18, 88 28 C 88 20, 82 14, 72 14 L 28 14 C 18 14, 12 20, 12 28 Z" fill="#ffffff" opacity="0.15" />
</svg>