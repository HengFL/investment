<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Base Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <!-- Primary Indigo -->
      <stop offset="100%" stop-color="#db2777" /> <!-- Secondary Pink -->
    </linearGradient>

    <!-- Strong Blur for the Liquid Blobs -->
    <filter id="blobBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" />
    </filter>

    <!-- Box Shadow for the entire icon -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1e1b4b" flood-opacity="0.3"/>
    </filter>

    <!-- Shadow for the text to pop out -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Specular Glass Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Base shape with shadow -->
  <rect width="100" height="100" rx="28" fill="url(#bgGrad)" filter="url(#iconShadow)" />
  
  <!-- Liquid Mesh Gradient Blobs -->
  <g filter="url(#blobBlur)">
    <circle cx="20" cy="20" r="38" fill="#6366f1" opacity="0.9" /> <!-- Indigo Blob -->
    <circle cx="80" cy="80" r="40" fill="#ec4899" opacity="0.9" /> <!-- Pink Blob -->
    <circle cx="20" cy="80" r="35" fill="#10b981" opacity="0.75" /> <!-- Emerald Blob -->
    <circle cx="85" cy="20" r="30" fill="#f59e0b" opacity="0.65" /> <!-- Amber Blob -->
  </g>

  <!-- Glass Overlay Base (Frosted Glass tint) -->
  <rect width="100" height="100" rx="28" fill="#ffffff" fill-opacity="0.15" />
  
  <!-- Specular 3D Border -->
  <rect width="96" height="96" x="2" y="2" rx="26" fill="none" stroke="url(#borderGrad)" stroke-width="2.5" />
  
  <!-- Intense Top-Left Specular Glare (Light Reflection) -->
  <path d="M 4 34 C 4 16, 16 4, 34 4 L 66 4 C 84 4, 96 16, 96 34 C 96 18, 84 8, 66 8 L 34 8 C 16 8, 4 18, 4 34 Z" fill="#ffffff" opacity="0.7" />

  <!-- The Letter "I" (Deep Shadowed Base) -->
  <text x="50%" y="54%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="'Outfit', 'Inter', system-ui, sans-serif" 
        font-weight="900" 
        font-size="60" 
        fill="#ffffff"
        filter="url(#textShadow)">I</text>
        
  <!-- The Letter "I" (Glossy Highlighted Surface) -->
  <text x="50%" y="52%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        font-family="'Outfit', 'Inter', system-ui, sans-serif" 
        font-weight="900" 
        font-size="60" 
        fill="#ffffff"
        opacity="0.8">I</text>
</svg>